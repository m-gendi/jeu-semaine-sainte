<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pèlerinage 3D des 50 Jours (Khamaseen)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Ciel bleu */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .header {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #f59e0b;
            pointer-events: auto;
        }
        .header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: #fbd38d;
        }
        .header p {
            margin: 5px 0 0 0;
            font-size: 0.8rem;
        }
        /* Dialog Box */
        #dialog-box {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            margin: 20px auto;
            width: 90%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            pointer-events: auto;
            overflow: hidden;
            border: 2px solid #b45309;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
        }
        #dialog-box.active {
            display: block;
            transform: translateY(0);
            opacity: 1;
        }
        .dialog-header {
            background: #b45309;
            color: white;
            padding: 15px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .dialog-content {
            padding: 20px;
            color: #1e293b;
            font-size: 1rem;
            line-height: 1.5;
        }
        .bible-quote {
            font-style: italic;
            border-left: 4px solid #f59e0b;
            padding-left: 10px;
            margin-bottom: 15px;
            color: #334155;
        }
        .dogma-box {
            background: #fef3c7;
            border: 1px solid #fde68a;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .dogma-title {
            font-weight: bold;
            color: #92400e;
            margin-bottom: 5px;
        }
        .sources-section {
            font-size: 0.8rem;
            color: #64748b;
            border-top: 1px solid #cbd5e1;
            padding-top: 10px;
        }
        .btn-close {
            display: block;
            width: 100%;
            padding: 15px;
            background: #f1f5f9;
            border: none;
            border-top: 1px solid #cbd5e1;
            font-weight: bold;
            color: #0f172a;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-close:hover {
            background: #e2e8f0;
        }
        /* Mobile Controls */
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px;
            gap: 10px;
            pointer-events: auto;
        }
        .d-btn {
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            user-select: none;
            cursor: pointer;
        }
        .d-btn:active {
            background: rgba(255, 255, 255, 0.8);
        }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }

        /* Floating NPC Labels */
        .npc-label {
            position: absolute;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            transform: translate(-50%, -50%);
            border: 1px solid #f59e0b;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        #interaction-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            display: none;
        }

        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
            z-index: 9999;
        }

        /* --- QUIZ UI --- */
        #quiz-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        #quiz-container {
            background: white;
            width: 90%;
            max-width: 700px;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 3px solid #b45309;
            text-align: center;
            overflow-y: auto;
            max-height: 90vh;
        }
        #quiz-title {
            color: #b45309;
            margin-top: 0;
            font-size: 1.8rem;
        }
        #quiz-question {
            font-size: 1.2rem;
            color: #1e293b;
            margin: 20px 0;
            font-weight: bold;
        }
        .quiz-option {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            background: #f1f5f9;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .quiz-option:hover:not(:disabled) {
            background: #e2e8f0;
            border-color: #94a3b8;
        }
        .quiz-option.correct {
            background: #dcfce7;
            border-color: #22c55e;
            color: #166534;
        }
        .quiz-option.wrong {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }
        #quiz-feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 0.95rem;
            text-align: left;
        }
        #quiz-next-btn, #quiz-restart-btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: #b45309;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            display: none;
        }
        #quiz-next-btn:hover, #quiz-restart-btn:hover {
            background: #92400e;
        }
        #quiz-progress {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 15px;
        }

        @media (min-width: 768px) {
            #mobile-controls { display: none; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="header">
            <h1>Pèlerinage des 50 Jours (Khamaseen)</h1>
            <p>Utilisez les flèches pour marcher. Approchez les personnages pour méditer les Écritures.</p>
        </div>

        <div id="interaction-hint">Appuyez sur ESPACE pour interagir</div>

        <div id="dialog-box">
            <div class="dialog-header" id="dialog-title">Titre</div>
            <div class="dialog-content">
                <div class="bible-quote" id="dialog-quote">Citation biblique</div>
                <div class="dogma-box">
                    <div class="dogma-title">Dogme & Rite Copte Orthodoxe</div>
                    <div id="dialog-dogma">Règle liturgique</div>
                </div>
                <div class="sources-section" id="dialog-sources">
                    Sources
                </div>
            </div>
            <button class="btn-close" id="btn-close-dialog">Continuer le pèlerinage</button>
        </div>

        <div id="mobile-controls">
            <div class="d-btn" id="btn-up">↑</div>
            <div class="d-btn" id="btn-left">←</div>
            <div class="d-btn" id="btn-down">↓</div>
            <div class="d-btn" id="btn-right">→</div>
        </div>
        
        <div id="fade-overlay"></div>
    </div>

    <!-- Interface du Questionnaire -->
    <div id="quiz-overlay">
        <div id="quiz-container">
            <h2 id="quiz-title">L'Épreuve du Témoin</h2>
            <div id="quiz-progress">Question 1 / 5</div>
            <div id="quiz-question">Question text</div>
            <div id="quiz-options"></div>
            <div id="quiz-feedback"></div>
            <button id="quiz-next-btn">Question suivante</button>
            <button id="quiz-restart-btn">Terminer le pèlerinage</button>
        </div>
    </div>

    <script>
        // --- DONNÉES FACTUELLES ET SOURCÉES ---
        const npcData = [
            {
                id: "mary", name: "Marie-Madeleine (Jour 1)", position: { x: -8, z: -5 }, color: 0xe11d48,
                title: "Le Tombeau Vide", quote: "« Ils ont enlevé le Seigneur du sépulcre, et nous ne savons où ils l'ont mis. » (Jean 20:2)",
                dogma: "La Résurrection marque le début du 'Khamaseen' (50 jours). Le ton liturgique devient 'Frayhi' (joyeux). Le jeûne et les métanies (prosternations) sont strictement interdits.",
                sources: "Bible : Jean 20:1-18. Rite : Synaxaire Copte.", action: "dialog"
            },
            {
                id: "sepulchre_door", name: "Entrée du Sépulcre", position: { x: -15, z: -8 }, color: 0x475569,
                title: "Entrer dans le Tombeau", quote: "", dogma: "", sources: "", action: "teleport_sepulchre_inside"
            },
            {
                id: "linen", name: "Les Bandelettes", position: { x: -500, z: -505 }, color: 0xffffff,
                title: "Les linges pliés", quote: "« Il vit les bandes qui étaient à terre, et le linge qu'on avait mis sur la tête de Jésus, non pas avec les bandes, mais plié dans un lieu à part. » (Jean 20:6-7)",
                dogma: "L'ordre parfait des linges réfute le vol (Jean 20:7). Les voleurs n'auraient pas pris le temps de plier le suaire.",
                sources: "Bible : Jean 20:6-7.", action: "dialog"
            },
            {
                id: "sepulchre_exit", name: "Sortir du Tombeau", position: { x: -500, z: -495 }, color: 0x475569,
                title: "Sortir", quote: "", dogma: "", sources: "", action: "teleport_sepulchre_outside"
            },
            {
                id: "emmaus", name: "Disciples d'Emmaüs (Jour 1)", position: { x: 15, z: -28 }, color: 0xd97706,
                title: "À l'Auberge d'Emmaüs", quote: "« Notre cœur ne brûlait-il pas au dedans de nous, lorsqu'il nous parlait en chemin ? » (Luc 24:32)",
                dogma: "Le Christ se fait reconnaître à la 'fraction du pain'. Cela fonde la présence réelle dans l'Eucharistie.",
                sources: "Bible : Luc 24:13-35. Dogme : Mystères Divins.", action: "dialog"
            },
            {
                id: "cenacle_door", name: "Porte du Cénacle", position: { x: -10, z: -35 }, color: 0x8b4513,
                title: "Entrer", quote: "", dogma: "", sources: "", action: "teleport_inside"
            },
            {
                id: "thomas", name: "Saint Thomas (Jour 8)", position: { x: 497, z: 490 }, color: 0x16a34a,
                title: "Le Dimanche de la Nouvelle", quote: "« Thomas lui répondit : Mon Seigneur et mon Dieu ! » (Jean 20:28)",
                dogma: "Le 8ème jour (Ahad Touma) affirme la divinité absolue du Christ et la réalité physique de la Résurrection.",
                sources: "Bible : Jean 20:24-29. Liturgie : Katamaros Copte.", action: "dialog"
            },
            {
                id: "peter", name: "Saint Pierre", position: { x: 503, z: 490 }, color: 0x2563eb,
                title: "La joie des disciples", quote: "« Les disciples furent dans la joie en voyant le Seigneur. » (Jean 20:20)",
                dogma: "La présence du Christ transforme la peur en joie. L'assemblée préfigure la liturgie dominicale.",
                sources: "Bible : Jean 20:20.", action: "dialog"
            },
            {
                id: "john", name: "Saint Jean", position: { x: 500, z: 493 }, color: 0x9333ea,
                title: "Le Témoin", quote: "« Ces choses ont été écrites afin que vous croyiez que Jésus est le Christ. » (Jean 20:31)",
                dogma: "L'Église s'appuie sur le témoignage apostolique oculaire.",
                sources: "Bible : Jean 20:30-31.", action: "dialog"
            },
            {
                id: "disciple_generic", name: "Les autres disciples", position: { x: 495, z: 493 }, color: 0x64748b,
                title: "L'assemblée du Cénacle", quote: "« Jésus vint, les portes étant fermées, et dit : La paix soit avec vous ! » (Jean 20:26)",
                dogma: "Le corps glorifié n'est plus soumis aux limites physiques tout en restant pleinement charnel.",
                sources: "Bible : Jean 20:26. Christologie orthodoxe.", action: "dialog"
            },
            {
                id: "cenacle_exit", name: "Sortir du Cénacle", position: { x: 500, z: 505 }, color: 0x8b4513,
                title: "Sortir", quote: "", dogma: "", sources: "", action: "teleport_outside"
            },
            {
                id: "ascension", name: "L'Ascension (Jour 40)", position: { x: 5, z: -60 }, color: 0x0284c7,
                title: "Le Mont des Oliviers", quote: "« Ce Jésus, qui a été enlevé au ciel du milieu de vous, viendra de la même manière. » (Actes 1:11)",
                dogma: "Procession uniquement dans le sanctuaire à partir de ce jour (symbole de l'entrée au ciel).",
                sources: "Bible : Actes 1:9-11. Rite Copte.", action: "dialog"
            },
            {
                id: "pentecost", name: "La Pentecôte (Jour 50)", position: { x: 0, z: -80 }, color: 0xfacc15,
                title: "La Descente de l'Esprit Saint", quote: "« Et ils furent tous remplis du Saint-Esprit. » (Actes 2:4)",
                dogma: "Fin du Khamaseen. Office de la Génuflexion (Sajda) le soir. L'Esprit procède du Père seul.",
                sources: "Bible : Actes 2:1-4. Dogme : Credo de Nicée.", action: "dialog"
            },
            {
                id: "finish_line", name: "Porte de l'Évangélisation (Fin)", position: { x: 0, z: -100 }, color: 0xf59e0b,
                title: "L'Heure du Témoignage", quote: "« Allez par tout le monde, et prêchez la bonne nouvelle à toute la création. » (Marc 16:15)",
                dogma: "Les 50 jours sont terminés. Le jeûne des apôtres commence pour préparer la prédication. Il est temps de vérifier si vous avez bien gardé la Parole.",
                sources: "Bible : Marc 16:15.", action: "start_quiz"
            }
        ];

        // --- DONNÉES DU QUIZ ---
        const quizData = [
            {
                question: "Pendant les 50 jours du Khamaseen, qu'est-il strictement interdit de faire dans l'Église copte orthodoxe ?",
                options: ["Prier le soir", "Jeûner et faire des métanies (prosternations)", "Lire l'Ancien Testament", "Chanter des louanges"],
                correctAnswer: 1,
                explanation: "Exact ! Le Khamaseen est une période de fête continue. L'Église interdit le jeûne et les métanies de pénitence car l'Époux est avec nous."
            },
            {
                question: "Que prouvent dogmatiquement les linges parfaitement pliés trouvés par Jean et Pierre dans le tombeau vide ?",
                options: ["Que les apôtres ont nettoyé le tombeau", "Que Jésus était pauvre", "Que le corps n'a pas été volé en hâte", "Que les anges portaient ces linges"],
                correctAnswer: 2,
                explanation: "Exact. L'ordre parfait réfute la rumeur d'un vol de corps. Des voleurs n'auraient pas pris le temps d'enlever les linges et de plier le suaire à part (Jean 20:7)."
            },
            {
                question: "Complétez la confession de foi de Saint Thomas le 8ème jour : « Mon Seigneur et mon... »",
                options: ["Sauveur !", "Roi !", "Dieu !", "Maître !"],
                correctAnswer: 2,
                explanation: "« Mon Seigneur et mon Dieu ! » (Jean 20:28). Ce 8ème jour affirme formellement la divinité absolue du Christ."
            },
            {
                question: "À partir du 40ème jour (l'Ascension), que se passe-t-il concernant la procession de la Résurrection à l'église ?",
                options: ["Elle se fait uniquement dans le sanctuaire", "Elle sort dans les rues de la ville", "Elle se fait sans utiliser d'encens", "Elle est complètement annulée"],
                correctAnswer: 0,
                explanation: "La procession ne se fait plus dans la nef mais uniquement dans le sanctuaire, symbolisant l'entrée du Christ au ciel."
            },
            {
                question: "Que marque l'office de la Génuflexion (Sajda) célébré le soir de la Pentecôte ?",
                options: ["La fin définitive des prières de l'année", "Le retour autorisé des prosternations et le don de l'Esprit", "Le début de l'année copte", "La montée de Jésus au ciel"],
                correctAnswer: 1,
                explanation: "Après 50 jours d'interdiction, les croyants fléchissent de nouveau les genoux pour adorer la Trinité et le Saint-Esprit qui vient d'être donné."
            }
        ];

        // --- MOTEUR 3D ---
        window.onload = function() {
            let scene, camera, renderer, player;
            let npcs = [];
            let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };
            let isDialogActive = false;
            let ascensionChrist = null;
            let flames = [];
            
            const obstacles = [];
            const speed = 0.22;
            const interactionDistance = 4;

            let currentQuestionIndex = 0;
            let quizScore = 0;

            init();
            animate();

            function init() {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87CEEB);
                scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 12, 15);
                camera.lookAt(0, 0, 0);

                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                document.getElementById('canvas-container').appendChild(renderer.domElement);

                scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const dirLight = new THREE.DirectionalLight(0xffdfb0, 0.8);
                dirLight.position.set(20, 40, 20);
                dirLight.castShadow = true;
                scene.add(dirLight);

                // --- SOL DE BASE (Sable de Judée) ---
                const groundMat = new THREE.MeshStandardMaterial({ color: 0xe6c280, roughness: 0.9 });
                const ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), groundMat);
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                scene.add(ground);

                // --- FONCTIONS DE DÉCORATION ---
                // Créer un patch de sol texturé (couleur)
                function createGroundPatch(x, z, w, d, colorHex) {
                    const patchMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 1.0 });
                    const patch = new THREE.Mesh(new THREE.PlaneGeometry(w, d), patchMat);
                    patch.rotation.x = -Math.PI / 2;
                    patch.position.set(x, 0.02, z); // Légèrement au-dessus pour éviter le Z-fighting
                    patch.receiveShadow = true;
                    scene.add(patch);
                }

                // Créer un arbre (Olivier)
                function createOliveTree(x, z) {
                    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3b2c }); // Tronc noueux sombre
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 2.5), trunkMat);
                    trunk.position.set(x, 1.25, z);
                    
                    const leavesMat = new THREE.MeshStandardMaterial({ color: 0x556b2f }); // Vert olive terne
                    // Une canopée un peu plus large
                    const leaves = new THREE.Mesh(new THREE.DodecahedronGeometry(1.8, 1), leavesMat);
                    leaves.position.set(x, 3, z);
                    
                    trunk.castShadow = true;
                    leaves.castShadow = true;
                    scene.add(trunk, leaves);
                }

                // Créer un buisson
                function createBush(x, z, size = 1) {
                    const bushMat = new THREE.MeshStandardMaterial({ color: 0x228b22 }); // Vert forêt
                    const bush = new THREE.Mesh(new THREE.DodecahedronGeometry(size, 0), bushMat);
                    bush.position.set(x, size/2, z);
                    bush.castShadow = true;
                    scene.add(bush);
                }

                // Créer un rocher
                function createRock(x, z, size = 0.5) {
                    const rockMat = new THREE.MeshStandardMaterial({ color: 0x78716c, roughness: 0.9 });
                    const rock = new THREE.Mesh(new THREE.IcosahedronGeometry(size, 0), rockMat);
                    rock.position.set(x, size/2, z);
                    rock.rotation.set(Math.random(), Math.random(), Math.random());
                    rock.castShadow = true;
                    scene.add(rock);
                }

                const rockMat = new THREE.MeshStandardMaterial({ color: 0x78716c });

                // --- 1. LE JARDIN DU TOMBEAU (Jean 19:41) ---
                // Sol vert (Jardin)
                createGroundPatch(-15, -10, 25, 25, 0x4d7c0f);
                
                // Le Sépulcre
                createBuilding(-15, -15, 12, 6, 10, rockMat);
                obstacles.push({ minX: -21, maxX: -9, minZ: -20, maxZ: -10 });
                
                const stone = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 0.5, 16), rockMat);
                stone.rotation.x = Math.PI / 2;
                stone.position.set(-12, 2, -9);
                stone.castShadow = true;
                scene.add(stone);

                // Végétation et rochers du jardin
                createBush(-20, -5, 1.2);
                createBush(-22, -15, 1.5);
                createBush(-8, -12, 1);
                createRock(-10, -5, 0.6);
                createRock(-18, -2, 0.4);

                // --- 2. LE CHEMIN D'EMMAÜS ---
                // Route de terre battue vers l'auberge
                createGroundPatch(15, -15, 6, 30, 0xa16207); // Chemin marron
                
                const woodMat = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
                createBuilding(15, -30, 8, 5, 6, new THREE.MeshStandardMaterial({ color: 0x94a3b8 })); 
                obstacles.push({ minX: 11, maxX: 19, minZ: -33, maxZ: -27 });
                
                const emmRoof = new THREE.Mesh(new THREE.BoxGeometry(9, 0.5, 7), woodMat);
                emmRoof.position.set(15, 5, -30);
                scene.add(emmRoof);

                const tableTop = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 3), woodMat);
                tableTop.position.set(15, 1.5, -28);
                const tableLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1.5), woodMat);
                tableLeg.position.set(15, 0.75, -28);
                scene.add(tableTop, tableLeg);
                
                const bread = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.2), new THREE.MeshStandardMaterial({ color: 0xf59e0b }));
                bread.position.set(15, 1.7, -28);
                scene.add(bread);

                createBush(10, -25, 0.8);
                createRock(18, -20, 0.5);

                // --- 3. JÉRUSALEM (Maison du Cénacle & Pentecôte) ---
                // Parvis pavé (Gris)
                createGroundPatch(-5, -55, 30, 60, 0x9ca3af);

                const houseMat = new THREE.MeshStandardMaterial({ color: 0xebd5b3 });
                createBuilding(-10, -38, 8, 7, 6, houseMat);
                obstacles.push({ minX: -14, maxX: -6, minZ: -41, maxZ: -35 });
                
                const roof = new THREE.Mesh(new THREE.BoxGeometry(9, 0.5, 7), new THREE.MeshStandardMaterial({ color: 0x5c4033 }));
                roof.position.set(-10, 7, -38);
                scene.add(roof);

                // Décorations de la ville (piliers, petits murets)
                createBuilding(5, -45, 15, 1, 1, new THREE.MeshStandardMaterial({ color: 0x64748b }));
                createBuilding(-15, -55, 1, 1, 15, new THREE.MeshStandardMaterial({ color: 0x64748b }));

                // --- 4. LE MONT DES OLIVIERS (Actes 1:12) ---
                // Sol en herbe
                createGroundPatch(15, -60, 25, 25, 0x65a30d);
                
                createOliveTree(8, -55);
                createOliveTree(18, -62);
                createOliveTree(12, -68);
                createOliveTree(20, -58);
                
                createRock(10, -60, 0.8);
                createRock(15, -58, 0.5);
                createBush(14, -65, 1.2);

                // L'Arche d'Or (Ligne d'arrivée)
                const archMat = new THREE.MeshStandardMaterial({ color: 0xf59e0b });
                const pillar1 = new THREE.Mesh(new THREE.BoxGeometry(1, 8, 1), archMat);
                pillar1.position.set(-4, 4, -100);
                const pillar2 = new THREE.Mesh(new THREE.BoxGeometry(1, 8, 1), archMat);
                pillar2.position.set(4, 4, -100);
                const archTop = new THREE.Mesh(new THREE.BoxGeometry(9, 1, 1), archMat);
                archTop.position.set(0, 8.5, -100);
                scene.add(pillar1, pillar2, archTop);


                // --- INTÉRIEURS (Hors de la carte principale) ---
                // Sépulcre Intérieur
                const sepulchreGroup = new THREE.Group();
                const sepFloor = new THREE.Mesh(new THREE.PlaneGeometry(15, 15), rockMat);
                sepFloor.rotation.x = -Math.PI / 2;
                sepulchreGroup.add(sepFloor);
                const wallGeoH = new THREE.BoxGeometry(15, 5, 1);
                const wallGeoV = new THREE.BoxGeometry(1, 5, 15);
                const w1 = new THREE.Mesh(wallGeoH, rockMat); w1.position.set(0, 2.5, -7.5);
                const w2 = new THREE.Mesh(wallGeoH, rockMat); w2.position.set(0, 2.5, 7.5);
                const w3 = new THREE.Mesh(wallGeoV, rockMat); w3.position.set(-7.5, 2.5, 0);
                const w4 = new THREE.Mesh(wallGeoV, rockMat); w4.position.set(7.5, 2.5, 0);
                sepulchreGroup.add(w1, w2, w3, w4);
                const stoneBed = new THREE.Mesh(new THREE.BoxGeometry(6, 1, 3), rockMat);
                stoneBed.position.set(0, 0.5, -4);
                sepulchreGroup.add(stoneBed);
                sepulchreGroup.position.set(-500, 0, -500);
                scene.add(sepulchreGroup);

                // Cénacle Intérieur
                const cenacleGroup = new THREE.Group();
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), new THREE.MeshStandardMaterial({ color: 0x5c4033 }));
                floor.rotation.x = -Math.PI / 2;
                cenacleGroup.add(floor);
                const cenacleWallMat = new THREE.MeshStandardMaterial({ color: 0xebd5b3 });
                const wallN = new THREE.Mesh(new THREE.BoxGeometry(30, 10, 1), cenacleWallMat); wallN.position.set(0, 5, -15);
                const wallS = new THREE.Mesh(new THREE.BoxGeometry(30, 10, 1), cenacleWallMat); wallS.position.set(0, 5, 15);
                const wallE = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 30), cenacleWallMat); wallE.position.set(15, 5, 0);
                const wallW = new THREE.Mesh(new THREE.BoxGeometry(1, 10, 30), cenacleWallMat); wallW.position.set(-15, 5, 0);
                cenacleGroup.add(wallN, wallS, wallE, wallW);
                const christ = createHuman(0xffffff, true);
                christ.position.set(0, 0, -10);
                cenacleGroup.add(christ);
                cenacleGroup.position.set(500, 0, 500);
                scene.add(cenacleGroup);

                // --- JOUEUR ET NPCs ---
                player = createHuman(0x3b82f6);
                scene.add(player);

                npcData.forEach(data => {
                    let npcMesh;
                    if (data.id.includes('door') || data.id.includes('exit')) {
                        npcMesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.5, 0.2), new THREE.MeshStandardMaterial({ color: data.color }));
                        npcMesh.position.set(data.position.x, 1.25, data.position.z);
                    } else if (data.id === "linen") {
                        npcMesh = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 1), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                        npcMesh.position.set(data.position.x, 1.05, data.position.z);
                    } else if (data.id === "ascension") {
                        // Position mise à jour pour correspondre au Mont des Oliviers
                        ascensionChrist = createHuman(0xffffff, true);
                        npcMesh = ascensionChrist;
                        npcMesh.position.set(data.position.x, 0, data.position.z);
                        const cloud = new THREE.Mesh(new THREE.SphereGeometry(3), new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 }));
                        cloud.position.set(data.position.x, 6, data.position.z);
                        scene.add(cloud);
                    } else if (data.id === "pentecost") {
                        npcMesh = createHuman(data.color);
                        npcMesh.position.set(data.position.x, 0, data.position.z);
                        const fGeo = new THREE.ConeGeometry(0.2, 0.6, 8);
                        const fMat = new THREE.MeshBasicMaterial({ color: 0xff4500 });
                        const mF = new THREE.Mesh(fGeo, fMat);
                        mF.position.set(data.position.x, 8, data.position.z);
                        scene.add(mF); flames.push(mF);
                        [{x: -2, z: 0}, {x: 2, z: 0}].forEach(off => {
                            const disc = createHuman(0x64748b);
                            disc.position.set(data.position.x + off.x, 0, data.position.z + off.z);
                            scene.add(disc);
                            const f = new THREE.Mesh(fGeo, fMat);
                            f.position.set(data.position.x + off.x, 8 + Math.random(), data.position.z + off.z);
                            scene.add(f); flames.push(f);
                        });
                    } else if (data.id === "finish_line") {
                        npcMesh = new THREE.Mesh(new THREE.BoxGeometry(6, 1, 1), new THREE.MeshBasicMaterial({ visible: false }));
                        npcMesh.position.set(data.position.x, 0, data.position.z);
                    } else {
                        npcMesh = createHuman(data.color);
                        npcMesh.position.set(data.position.x, 0, data.position.z);
                    }
                    scene.add(npcMesh);
                    
                    const label = document.createElement('div');
                    label.className = 'npc-label';
                    label.textContent = data.name;
                    document.getElementById('ui-layer').appendChild(label);
                    npcs.push({ mesh: npcMesh, data: data, label: label });
                });

                window.addEventListener('keydown', (e) => {
                    if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
                    if (e.key === ' ' && !isDialogActive) checkForInteraction();
                });
                window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });
                setupTouchControls('btn-up', 'ArrowUp'); setupTouchControls('btn-down', 'ArrowDown');
                setupTouchControls('btn-left', 'ArrowLeft'); setupTouchControls('btn-right', 'ArrowRight');
                document.getElementById('btn-close-dialog').addEventListener('click', closeDialog);
                
                document.getElementById('quiz-next-btn').addEventListener('click', () => {
                    currentQuestionIndex++;
                    loadQuizQuestion();
                });
                document.getElementById('quiz-restart-btn').addEventListener('click', () => {
                    location.reload(); 
                });

                window.addEventListener('resize', onWindowResize);
            }

            function createHuman(c, glow = false) {
                const g = new THREE.Group();
                const m = glow ? new THREE.MeshBasicMaterial({ color: c }) : new THREE.MeshStandardMaterial({ color: c });
                const b = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.6, 1.5, 16), m);
                b.position.y = 0.75; b.castShadow = !glow;
                const h = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), glow ? m : new THREE.MeshStandardMaterial({ color: 0xe0ac69 }));
                h.position.y = 1.7; h.castShadow = !glow;
                g.add(b, h); return g;
            }

            function setupTouchControls(id, k) {
                const el = document.getElementById(id);
                const act = (v) => (e) => { e.preventDefault(); keys[k] = v; };
                el.addEventListener('touchstart', act(true)); el.addEventListener('touchend', act(false));
                el.addEventListener('mousedown', act(true)); el.addEventListener('mouseup', act(false));
            }

            function createBuilding(x, z, w, h, d, mat) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                b.position.set(x, h/2, z); b.castShadow = true; b.receiveShadow = true;
                scene.add(b);
                return b;
            }

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            function checkForInteraction() {
                let closest = null;
                let minD = interactionDistance;
                npcs.forEach(npc => {
                    if (Math.abs(player.position.x - npc.data.position.x) < 50 && Math.abs(player.position.z - npc.data.position.z) < 50) {
                        const pos = (npc.data.id === 'ascension') ? new THREE.Vector3(npc.data.position.x, 0, npc.data.position.z) : npc.mesh.position;
                        const d = player.position.distanceTo(pos);
                        if (d < minD) { minD = d; closest = npc; }
                    }
                });
                if (closest) openDialog(closest.data);
            }

            function openDialog(d) {
                if (d.action === "teleport_inside") { teleportPlayer(500, 498); return; }
                if (d.action === "teleport_outside") { teleportPlayer(-10, -32); return; }
                if (d.action === "teleport_sepulchre_inside") { teleportPlayer(-500, -493); return; }
                if (d.action === "teleport_sepulchre_outside") { teleportPlayer(-15, -5); return; }
                
                if (d.action === "start_quiz") {
                    startQuiz();
                    return;
                }

                isDialogActive = true;
                for (let k in keys) keys[k] = false;
                document.getElementById('dialog-title').innerText = d.title;
                document.getElementById('dialog-quote').innerText = d.quote;
                document.getElementById('dialog-dogma').innerText = d.dogma;
                document.getElementById('dialog-sources').innerText = "Sources : " + d.sources;
                document.getElementById('dialog-box').classList.add('active');
                document.getElementById('interaction-hint').style.display = 'none';
            }

            function closeDialog() { isDialogActive = false; document.getElementById('dialog-box').classList.remove('active'); }

            function teleportPlayer(tx, tz) {
                const o = document.getElementById('fade-overlay');
                o.style.opacity = '1'; isDialogActive = true;
                setTimeout(() => {
                    player.position.set(tx, 0, tz);
                    camera.position.x = tx; camera.position.z = tz + 15; camera.lookAt(player.position);
                    setTimeout(() => { o.style.opacity = '0'; isDialogActive = false; }, 500);
                }, 1000);
            }

            // --- QUIZ ---
            function startQuiz() {
                isDialogActive = true; 
                for (let k in keys) keys[k] = false;
                
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('quiz-overlay').style.display = 'flex';
                
                currentQuestionIndex = 0;
                quizScore = 0;
                loadQuizQuestion();
            }

            function loadQuizQuestion() {
                const questionData = quizData[currentQuestionIndex];
                const feedbackDiv = document.getElementById('quiz-feedback');
                const nextBtn = document.getElementById('quiz-next-btn');
                const optionsDiv = document.getElementById('quiz-options');
                
                feedbackDiv.style.display = 'none';
                nextBtn.style.display = 'none';
                optionsDiv.innerHTML = '';
                
                if (currentQuestionIndex >= quizData.length) {
                    showFinalScore();
                    return;
                }

                document.getElementById('quiz-progress').innerText = `Question ${currentQuestionIndex + 1} / ${quizData.length}`;
                document.getElementById('quiz-question').innerText = questionData.question;

                questionData.options.forEach((optText, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'quiz-option';
                    btn.innerText = optText;
                    btn.onclick = () => handleAnswer(index, questionData.correctAnswer, questionData.explanation);
                    optionsDiv.appendChild(btn);
                });
            }

            function handleAnswer(selectedIndex, correctIndex, explanation) {
                const buttons = document.querySelectorAll('.quiz-option');
                const feedbackDiv = document.getElementById('quiz-feedback');
                const nextBtn = document.getElementById('quiz-next-btn');

                buttons.forEach(btn => btn.disabled = true);

                if (selectedIndex === correctIndex) {
                    buttons[selectedIndex].classList.add('correct');
                    quizScore++;
                    feedbackDiv.innerHTML = `<strong>Excellente réponse !</strong><br>${explanation}`;
                    feedbackDiv.style.background = "#dcfce7";
                    feedbackDiv.style.color = "#166534";
                } else {
                    buttons[selectedIndex].classList.add('wrong');
                    buttons[correctIndex].classList.add('correct');
                    feedbackDiv.innerHTML = `<strong>Erreur !</strong><br>${explanation}`;
                    feedbackDiv.style.background = "#fee2e2";
                    feedbackDiv.style.color = "#991b1b";
                }

                feedbackDiv.style.display = 'block';
                nextBtn.style.display = 'inline-block';
            }

            function showFinalScore() {
                document.getElementById('quiz-title').innerText = "Fin du Pèlerinage";
                document.getElementById('quiz-progress').style.display = 'none';
                document.getElementById('quiz-options').innerHTML = '';
                document.getElementById('quiz-feedback').style.display = 'none';
                document.getElementById('quiz-next-btn').style.display = 'none';
                
                const questionDiv = document.getElementById('quiz-question');
                let message = "";
                
                if (quizScore === quizData.length) {
                    message = "Parfait ! Vous avez gardé la Parole et connaissez parfaitement les mystères du Khamaseen.";
                } else if (quizScore >= 3) {
                    message = "Très bien ! Vous êtes un bon témoin de la Résurrection.";
                } else {
                    message = "Il y a encore des choses à apprendre sur le dogme. N'hésitez pas à refaire le pèlerinage !";
                }

                questionDiv.innerHTML = `<span style="font-size:3rem; display:block; color:#b45309;">${quizScore} / ${quizData.length}</span><br>${message}`;
                
                document.getElementById('quiz-restart-btn').style.display = 'inline-block';
            }

            function updateLabels() {
                let near = false;
                npcs.forEach(npc => {
                    let d = 999;
                    if (Math.abs(player.position.x - npc.data.position.x) < 50 && Math.abs(player.position.z - npc.data.position.z) < 50) {
                        const pos = (npc.data.id === 'ascension' || npc.data.id === 'finish_line') ? new THREE.Vector3(npc.data.position.x, 0, npc.data.position.z) : npc.mesh.position;
                        d = player.position.distanceTo(pos);
                    }
                    if (d < interactionDistance) near = true;

                    const v = npc.mesh.position.clone();
                    v.y += (npc.data.id === 'pentecost') ? 3.8 : 2.2;
                    if (npc.data.id === 'finish_line') v.y += 2.0; 
                    
                    v.project(camera);
                    const x = (v.x * .5 + .5) * window.innerWidth;
                    const y = (v.y * -.5 + .5) * window.innerHeight;
                    if (v.z > 1) { npc.label.style.opacity = '0'; }
                    else { npc.label.style.opacity = '1'; npc.label.style.left = `${x}px`; npc.label.style.top = `${y}px`; }
                });
                document.getElementById('interaction-hint').style.display = (near && !isDialogActive) ? 'block' : 'none';
            }

            function checkCollision(x, z) {
                if (Math.abs(x) > 400) return false;
                const margin = 0.5;
                for (let obs of obstacles) {
                    if (x + margin > obs.minX && x - margin < obs.maxX &&
                        z + margin > obs.minZ && z - margin < obs.maxZ) {
                        return true;
                    }
                }
                return false;
            }

            function animate() {
                requestAnimationFrame(animate);
                if (!isDialogActive) {
                    let nextX = player.position.x;
                    let nextZ = player.position.z;
                    
                    if (keys.ArrowUp || keys.w) { nextZ -= speed; player.rotation.y = Math.PI; }
                    if (keys.ArrowDown || keys.s) { nextZ += speed; player.rotation.y = 0; }
                    if (keys.ArrowLeft || keys.a) { nextX -= speed; player.rotation.y = -Math.PI / 2; }
                    if (keys.ArrowRight || keys.d) { nextX += speed; player.rotation.y = Math.PI / 2; }

                    if (!checkCollision(nextX, nextZ)) {
                        player.position.x = nextX;
                        player.position.z = nextZ;
                    }
                }

                if (player.position.x > 400) {
                    player.position.x = Math.max(486, Math.min(514, player.position.x));
                    player.position.z = Math.max(486, Math.min(514, player.position.z));
                } else if (player.position.x < -400) {
                    player.position.x = Math.max(-506, Math.min(-494, player.position.x));
                    player.position.z = Math.max(-506, Math.min(-494, player.position.z));
                } else {
                    player.position.x = Math.max(-95, Math.min(95, player.position.x));
                    player.position.z = Math.max(-110, Math.min(145, player.position.z));
                }

                camera.position.x += (player.position.x - camera.position.x) * 0.1;
                camera.position.z += (player.position.z + 15 - camera.position.z) * 0.1;
                camera.lookAt(player.position);
                updateLabels();

                if (ascensionChrist) {
                    const dA = player.position.distanceTo(new THREE.Vector3(5, 0, -60));
                    if (dA < 20) { if (ascensionChrist.position.y < 6) ascensionChrist.position.y += 0.015; }
                    else { ascensionChrist.position.y = 0; }
                }
                if (flames.length > 0) {
                    const dP = player.position.distanceTo(new THREE.Vector3(0, 0, -80));
                    const t = Date.now() * 0.005;
                    if (dP < 25) {
                        flames.forEach((f, i) => {
                            const ty = 2.4 + Math.sin(t + i) * 0.1;
                            if (f.position.y > ty + 0.1) f.position.y -= 0.04; else f.position.y = ty;
                            const s = 1 + Math.sin(t * 3 + i) * 0.2; f.scale.set(s, s, s);
                        });
                    } else { flames.forEach(f => { f.position.y = 8 + Math.random() * 2; }); }
                }
                renderer.render(scene, camera);
            }
        };
    </script>
</body>
</html>
